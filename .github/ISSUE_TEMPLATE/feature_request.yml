name: Feature request
description: Propose a focused plugin, adapter, safety, or developer-workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult or unsafe today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the user-visible result, not only an implementation.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and compatibility considerations
      description: Mention user data, Hook trust, process control, upgrades, and uninstall behavior where relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
